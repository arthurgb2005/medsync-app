name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install ruff pytest
      - name: Run Linting (Ruff)
        run: ruff check src/
      - name: Run Tests (Pytest)
        run: pytest
